<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Civic AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div
      id="alertContainer"
      class="position-fixed top-0 end-0 p-3"
      style="z-index: 1050"
    ></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">🏛️ Civic AI</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="community.html">🌍 Community</a>
          <a class="nav-link" href="myreports.html">📋 My Reports</a>
          <a class="nav-link active" href="admin.html">🛠️ Admin</a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Admin Dashboard</h3>
        <div class="d-flex gap-2">
          <select id="filterStatus" class="form-select">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
          </select>
          <button id="refreshBtn" class="btn btn-outline-primary">
            Refresh
          </button>
        </div>
      </div>

      <div id="adminGuard" class="alert alert-warning d-none">
        <i class="bi bi-lock"></i> Admin access required.
      </div>

      <div class="card">
        <div class="card-body">
          <div id="adminList" class="row g-3"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
